[extend]
useDefault = true

# NOTE: this must stay the singular [allowlist] table. The plural
# [[allowlists]] form is silently ignored as a global allowlist by the
# gitleaks version pinned in CI, which un-suppresses every entry below.
[allowlist]
description = "Synthetic credentials used to verify secret masking and authentication failures"
paths = [
  '''packages/ingestion/db/agent_session_test\.go''',
  '''packages/ingestion/masking/masking_test\.go''',
  # The chunk scrubber's fixtures must look like real keys -- the tests assert
  # a Stripe-shaped token does not survive redaction, so a token gitleaks
  # ignores would prove nothing.
  '''packages/ingestion/scrubber/scrubber_test\.go''',
  # The read handler repeats that guarantee after fetching stored chunks; keep
  # its realistic canary scoped to this integration-test file as well.
  '''packages/ingestion/handler/session_read_test\.go''',
  # The admin jobs redactor asserts realistic-shaped GitHub/npm/Slack/AWS/JWT
  # tokens are stripped from last_error before operators see it; a token
  # gitleaks ignores would prove nothing.
  '''packages/ingestion/handler/admin_test\.go''',
  '''packages/sdk/src/__tests__/scrub\.test\.ts''',
  '''test-e2e/error-to-pr\.test\.ts''',
  '''test-e2e/replay-contract\.test\.ts''',
  # docs-sync's publish scanner test plants an AWS-shaped key and a generic
  # token to prove assertSecretFree() rejects them; a token gitleaks ignores
  # would prove nothing.
  '''scripts/__tests__/publish\.test\.mjs''',
]
regexes = [
  # Deterministic canary values planted by the keyless E2E lane's token-leak
  # scan (.github/workflows/ci.yml). Not secrets by construction.
  '''OPSLANE-E2E-CANARY-[a-z]+-[0-9a-f]+''',
  # Documentation placeholder API key used in README/docs curl examples.
  '''e2e-test-key-plaintext''',
]
