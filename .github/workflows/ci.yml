name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  go:
    name: Go build and test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16@sha256:ab47a724d0e37131ac950b98ff2beeb3fdb3bfcc592d73c6cc4b4e7626649671
        env:
          POSTGRES_USER: opslane
          POSTGRES_PASSWORD: opslane_dev
          POSTGRES_DB: opslane
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U opslane"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://opslane:opslane_dev@localhost:5432/opslane?sslmode=disable
      # Object storage. Without these, every test touching storage calls t.Skip
      # and the package still reports "ok" -- 30 tests, including the #47 and
      # #48 regression guards, silently never run.
      REPLAY_STORE_ENDPOINT: http://localhost:9012
      REPLAY_STORE_PUBLIC_ENDPOINT: http://localhost:9012
      REPLAY_STORE_ACCESS_KEY: minio
      REPLAY_STORE_SECRET_KEY: minio12345
      REPLAY_STORE_BUCKET: opslane-replays
      REPLAY_STORE_REGION: us-east-1
      # error_event_test.go's testMinIO helper reads the worker's MINIO_*
      # naming rather than ingestion's REPLAY_STORE_*. The split is deliberate
      # (see packages/worker); both names are set so neither side skips.
      MINIO_ENDPOINT: http://localhost:9012
      MINIO_PUBLIC_ENDPOINT: http://localhost:9012
      MINIO_ACCESS_KEY: minio
      MINIO_SECRET_KEY: minio12345
      MINIO_BUCKET: opslane-replays
      MINIO_REGION: us-east-1
    defaults:
      run:
        working-directory: packages/ingestion
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: packages/ingestion/go.mod
          cache-dependency-path: packages/ingestion/go.sum
      # Compose rather than a service container, for two reasons: a service
      # container cannot override the image's command (MinIO needs "server
      # /data"), and TestAnonymousGetIsForbidden guards the bucket policy that
      # compose's minio-setup applies. A bare bucket is private by default, so
      # without minio-setup that test would pass without ever exercising the
      # `mc anonymous set none` line it exists to protect.
      # minio defines no healthcheck, so `up --wait` would return as soon as the
      # container is running rather than serving. minio-setup's own
      # `until mc alias set ...` loop is the real readiness gate, and `run --rm`
      # propagates its exit code -- `up` would swallow a failed policy apply.
      - name: Start object storage
        working-directory: .
        run: |
          docker compose up -d minio
          docker compose run --rm minio-setup
      - name: Apply migrations
        run: MIGRATION_DIR=db/migrations ../../scripts/run-migrations.sh
      - run: go build ./...
      - run: go vet ./...
      - name: Test (fails on unexpected skips)
        run: |
          set -o pipefail
          go test ./... -v 2>&1 | tee /tmp/go-test.log
          ../../scripts/check-go-skips.mjs /tmp/go-test.log

  js:
    name: JS build and test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16@sha256:ab47a724d0e37131ac950b98ff2beeb3fdb3bfcc592d73c6cc4b4e7626649671
        env:
          POSTGRES_USER: opslane
          POSTGRES_PASSWORD: opslane_dev
          POSTGRES_DB: opslane
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U opslane"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://opslane:opslane_dev@localhost:5432/opslane?sslmode=disable
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - name: Apply migrations
        run: MIGRATION_DIR=packages/ingestion/db/migrations ./scripts/run-migrations.sh
      - run: pnpm install --frozen-lockfile
      - name: Install Playwright chromium (SDK browser tests)
        run: pnpm --filter @opslane/sdk exec playwright install --with-deps chromium
      - run: pnpm -r build
      - run: pnpm test
      - name: License-boundary check (MIT-published packages)
        run: node scripts/check-licenses.mjs

  sdk-python:
    name: Python SDK tests (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12', '3.13', '3.14']
    defaults:
      run:
        working-directory: packages/sdk-python
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install -e '.[dev]'
      - run: python -m pytest -v
      - name: Build and validate artifacts
        if: matrix.python-version == '3.14'
        run: |
          python -m pip install build twine
          python -m build
          python -m twine check --strict dist/*
          python -m venv /tmp/wheelcheck
          /tmp/wheelcheck/bin/pip install dist/*.whl
          /tmp/wheelcheck/bin/python -c "import opslane, importlib.metadata as md; assert opslane.__version__ == md.version('opslane'); print('wheel ok', opslane.__version__)"
          python -m venv /tmp/sdistcheck
          /tmp/sdistcheck/bin/pip install dist/*.tar.gz
          /tmp/sdistcheck/bin/python -c "import opslane; print('sdist ok', opslane.__version__)"

  compose:
    name: Compose validation
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - run: docker compose config --quiet

  docker:
    name: Docker build (${{ matrix.image }})
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        image: [ingestion, worker]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - run: docker build -f packages/${{ matrix.image }}/Dockerfile .

  e2e-keyless:
    name: Keyless smoke E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      # Deterministic canaries planted where real secrets would live; the leak
      # scan below fails the job if they surface in logs or HTTP responses.
      GITHUB_APP_CLIENT_SECRET: OPSLANE-E2E-CANARY-ingestion-2f9c41d7
      E2B_API_KEY: OPSLANE-E2E-CANARY-worker-8b1e63aa
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # The friction e2e gate runs the worker's session-analysis pipeline
      # in-process (issue #56), so the built worker package must exist.
      - run: pnpm --filter @opslane/shared --filter @opslane/worker build
      - name: Install Playwright chromium (browser smoke)
        run: pnpm --filter @opslane/test-e2e exec playwright install --with-deps chromium
      - name: Assert the LLM key is absent
        run: |
          if [ -n "${ANTHROPIC_API_KEY:-}" ]; then
            echo "ANTHROPIC_API_KEY must not be set in the keyless lane."
            exit 1
          fi
      - name: Boot the stack without an LLM key
        env:
          # The notifications contract test runs a webhook sink on the runner;
          # the container reaches it via the extra_hosts host-gateway mapping.
          NOTIFY_UNSAFE_EXTRA_WEBHOOK_HOSTS: host.docker.internal:9999
        run: |
          docker compose up -d postgres minio minio-setup
          docker compose run --rm migrate
          docker compose up -d --build --wait ingestion worker
      - name: Assert the worker container is keyless
        run: docker compose exec -T worker sh -c '[ -z "$ANTHROPIC_API_KEY" ]'
      - name: Run E2E contracts with hard assertions
        env:
          DATABASE_URL: postgres://opslane:opslane_dev@localhost:5434/opslane
          INGESTION_URL: http://localhost:8082
          E2E_WORKER_NO_KEY: "1"
          # Friction gate (issue #56): host-reachable MinIO for the in-process
          # chunk read; the injected adjudicator keeps this lane keyless.
          MINIO_ENDPOINT: http://localhost:9012
          MINIO_ACCESS_KEY: minio
          MINIO_SECRET_KEY: minio12345
          MINIO_BUCKET: opslane-replays
        run: >
          pnpm --filter @opslane/test-e2e exec vitest run
          --reporter=default --reporter=json
          --outputFile=${{ runner.temp }}/e2e-results.json
      - name: Enforce zero unexpected skips
        env:
          # The with-secrets PR pipeline suite is the only allowed skip here.
          E2E_ALLOWED_SKIP_PATTERN: '^pr_created pipeline \(full flow\)'
          E2E_MIN_TESTS: "31"
          # The browser smoke suites must be collected AND pass by name, so a
          # future edit cannot drop them while keeping the total count intact.
          E2E_REQUIRED_PATTERNS: |
            ^browser smoke: Vue error to needs_human >
            ^browser smoke: React error to needs_human >
            ^browser smoke: rage click to friction signal >
            ^notifications contract
        run: node scripts/check-e2e-results.mjs "${{ runner.temp }}/e2e-results.json"
      - name: Token-leak scan over logs and public HTTP surfaces
        run: |
          docker compose logs --no-color > "${{ runner.temp }}/stack-logs.txt"
          curl -fsS http://localhost:8082/health > "${{ runner.temp }}/responses.txt" || true
          curl -fsS http://localhost:8082/ >> "${{ runner.temp }}/responses.txt" || true
          leak=0
          for canary in "OPSLANE-E2E-CANARY-ingestion-2f9c41d7" "OPSLANE-E2E-CANARY-worker-8b1e63aa"; do
            if grep -qF "$canary" "${{ runner.temp }}/stack-logs.txt" "${{ runner.temp }}/responses.txt"; then
              echo "Token leak detected: $canary appeared in scanned surfaces."
              leak=1
            fi
          done
          [ "$leak" -eq 0 ] && echo "Leak scan clean."
          exit "$leak"
      - name: Dump stack logs on failure
        if: failure()
        run: docker compose logs --no-color | tail -300
      - name: Teardown
        if: always()
        run: docker compose down -v

  reliability-system:
    name: Deterministic event-to-PR reliability
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run deterministic success pipeline
        run: pnpm test:reliability:system
      - name: Dump harness logs on failure
        if: failure()
        run: docker compose logs --no-color | tail -300
      - name: Teardown
        if: always()
        run: docker compose down -v

  security:
    name: Secret scan and action pinning
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Gitleaks secret scan
        run: >
          docker run --rm -v "$PWD:/repo:ro"
          ghcr.io/gitleaks/gitleaks@sha256:e1b35e12a8c6fa8901f060459cfb6b2fc4c484d3afbe3b029733a3bbfab07055
          dir /repo --config /repo/.gitleaks.toml --no-banner --redact
      - name: Enforce SHA-pinned actions
        run: node scripts/check-action-pins.mjs

  ci-ok:
    name: ci-ok
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [go, js, compose, docker, e2e-keyless, reliability-system, security, sdk-python]
    if: always()
    steps:
      - name: Report job results
        env:
          RESULTS: ${{ toJSON(needs) }}
        run: echo "$RESULTS"
      - name: Fail on any failed, cancelled, or skipped required job
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') || contains(needs.*.result, 'skipped')
        run: exit 1

  # Candidate images: only on push to main, only after ci-ok. The unique tag
  # main-<sha>-<run-id>-<attempt> IS the candidate's identity (no stored
  # manifest); the release workflow resolves digests from it at promotion.
  candidate-images:
    name: Publish candidate images
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [ci-ok]
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        image: [ingestion, worker]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Log in to GHCR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: echo "$GH_TOKEN" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
      - name: Build and push candidate
        id: push
        env:
          IMAGE: ghcr.io/${{ github.repository_owner }}/opslane-${{ matrix.image }}
          TAG: main-${{ github.sha }}-${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          docker build -f "packages/${{ matrix.image }}/Dockerfile" -t "$IMAGE:$TAG" .
          docker push "$IMAGE:$TAG"
          digest=$(docker inspect --format '{{index .RepoDigests 0}}' "$IMAGE:$TAG")
          echo "Candidate pushed: $IMAGE:$TAG"
          echo "Digest: $digest"
          {
            echo "### Candidate: \`${{ matrix.image }}\`"
            echo '```'
            echo "tag:    $IMAGE:$TAG"
            echo "digest: $digest"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
