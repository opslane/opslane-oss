name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # Classifies the PR's changed files into the areas the heavy jobs gate on.
  #
  # INVARIANT this design depends on: ci-ok and wire-fixtures are the ONLY
  # required status checks on main. A job-level `if:` that evaluates false
  # reports SUCCESS to the status API, not pending -- so if an individual job
  # below is ever marked required directly, a filtered-out PR would pass with
  # that check green and nothing behind it. Check before changing:
  #   gh api repos/opslane/opslane-oss/branches/main/protection \
  #     --jq '.required_status_checks.contexts'
  #
  # This workflow runs on `pull_request`, so the classifier, the ci-ok checker,
  # and their tests all come from the PR head -- weakening the gate takes a
  # coordinated edit across scripts/ci-changed-areas.mjs, scripts/check-ci-ok.mjs,
  # and scripts/__tests__/, but it is a code-review control, not a CI one. The
  # wire-fixtures gate uses pull_request_target precisely to avoid that; this
  # one cannot, because it must diff the PR's own tree.
  #
  # Push to main deliberately classifies nothing and turns every area on:
  # candidate-images is published off a green ci-ok, so it must be backed by a
  # full run, and a classifier mistake then shows up as a red main rather than
  # a silent hole.
  changes:
    name: Classify changed files
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      go: ${{ steps.classify.outputs.go }}
      js: ${{ steps.classify.outputs.js }}
      python: ${{ steps.classify.outputs.python }}
      e2e: ${{ steps.classify.outputs.e2e }}
      reliability: ${{ steps.classify.outputs.reliability }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Classify
        id: classify
        env:
          # base.sha is the base ref tip at event time; the three-dot diff
          # below is what resolves the merge base from it. If main advanced
          # since, the merge base is the same or older, so the file set is the
          # same or larger -- wrong in the safe direction.
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          EVENT: ${{ github.event_name }}
        run: |
          set -euo pipefail
          if [ "$EVENT" != "pull_request" ]; then
            echo "Not a pull request; running every area."
            for area in go js python e2e reliability; do
              echo "$area=true" >> "$GITHUB_OUTPUT"
            done
            exit 0
          fi
          if [ -z "$BASE_SHA" ]; then
            echo "pull_request.base.sha is empty; cannot classify." >&2
            exit 1
          fi
          # --no-renames: a detected rename reports only the destination, so
          # moving an active file into docs/ could otherwise suppress the jobs
          # that covered it. Without rename detection it is a delete plus an
          # add, and both paths get classified.
          git diff --no-renames --name-only -z "$BASE_SHA...HEAD" \
            | node scripts/ci-changed-areas.mjs \
            | tee -a "$GITHUB_OUTPUT"
      - name: Summarize
        run: |
          {
            echo "### Changed-file classification"
            echo '```'
            echo "go=${{ steps.classify.outputs.go }}"
            echo "js=${{ steps.classify.outputs.js }}"
            echo "python=${{ steps.classify.outputs.python }}"
            echo "e2e=${{ steps.classify.outputs.e2e }}"
            echo "reliability=${{ steps.classify.outputs.reliability }}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  go:
    name: Go build and test
    needs: [changes]
    if: needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16@sha256:ab47a724d0e37131ac950b98ff2beeb3fdb3bfcc592d73c6cc4b4e7626649671
        env:
          POSTGRES_USER: opslane
          POSTGRES_PASSWORD: opslane_dev
          POSTGRES_DB: opslane
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U opslane"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://opslane:opslane_dev@localhost:5432/opslane?sslmode=disable
      # Object storage. Without these, every test touching storage calls t.Skip
      # and the package still reports "ok" -- 30 tests, including the #47 and
      # #48 regression guards, silently never run.
      REPLAY_STORE_ENDPOINT: http://localhost:9012
      REPLAY_STORE_PUBLIC_ENDPOINT: http://localhost:9012
      REPLAY_STORE_ACCESS_KEY: minio
      REPLAY_STORE_SECRET_KEY: minio12345
      REPLAY_STORE_BUCKET: opslane-replays
      REPLAY_STORE_REGION: us-east-1
      # error_event_test.go's testMinIO helper reads the worker's MINIO_*
      # naming rather than ingestion's REPLAY_STORE_*. The split is deliberate
      # (see packages/worker); both names are set so neither side skips.
      MINIO_ENDPOINT: http://localhost:9012
      MINIO_PUBLIC_ENDPOINT: http://localhost:9012
      MINIO_ACCESS_KEY: minio
      MINIO_SECRET_KEY: minio12345
      MINIO_BUCKET: opslane-replays
      MINIO_REGION: us-east-1
    defaults:
      run:
        working-directory: packages/ingestion
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: packages/ingestion/go.mod
          cache-dependency-path: packages/ingestion/go.sum
      # Compose rather than a service container, for two reasons: a service
      # container cannot override the image's command (MinIO needs "server
      # /data"), and TestAnonymousGetIsForbidden guards the bucket policy that
      # compose's minio-setup applies. A bare bucket is private by default, so
      # without minio-setup that test would pass without ever exercising the
      # `mc anonymous set none` line it exists to protect.
      # minio defines no healthcheck, so `up --wait` would return as soon as the
      # container is running rather than serving. minio-setup's own
      # `until mc alias set ...` loop is the real readiness gate, and `run --rm`
      # propagates its exit code -- `up` would swallow a failed policy apply.
      - name: Start object storage
        working-directory: .
        run: |
          docker compose up -d minio
          docker compose run --rm minio-setup
      - name: Apply migrations
        run: MIGRATION_DIR=db/migrations ../../scripts/run-migrations.sh
      - run: go build ./...
      - run: go vet ./...
      - name: Test (fails on unexpected skips)
        run: |
          set -o pipefail
          go test ./... -v 2>&1 | tee /tmp/go-test.log
          ../../scripts/check-go-skips.mjs /tmp/go-test.log

  # Repo-wide static checks: docs drift/scope, action pinning, wire-fixture
  # policy tests. Deliberately unconditional, and deliberately NOT inside the
  # js job -- these are the checks that read docs/, .github/workflows/, and
  # Go/worker/SDK source, so leaving them in js would make js un-skippable for
  # almost every change. Keeping them always-on is also what makes it safe to
  # skip everything else on a docs-only or workflow-only PR.
  repo-checks:
    name: Repo-wide checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # docs-sync's runnable-snippet tests reach test:repo through
      # docs:map:test, and they type-check the docs' examples for real: each
      # runs `pnpm build` inside test-fixtures/react-app or vue-app, which
      # resolve @opslane/sdk over the workspace link and therefore need
      # packages/sdk/dist on disk. This job used to be part of js, which ran
      # `pnpm -r build` first and supplied that implicitly.
      #
      # Only the SDK is needed: it has no workspace dependencies of its own,
      # and those two fixtures depend on nothing else in the repo. Should a
      # future runnable snippet import another package, this job fails --
      # it is always-on, so the gap surfaces immediately rather than rotting.
      - run: pnpm --filter @opslane/sdk build
      - run: pnpm test:repo

  js:
    name: JS build and test
    needs: [changes]
    if: needs.changes.outputs.js == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16@sha256:ab47a724d0e37131ac950b98ff2beeb3fdb3bfcc592d73c6cc4b4e7626649671
        env:
          POSTGRES_USER: opslane
          POSTGRES_PASSWORD: opslane_dev
          POSTGRES_DB: opslane
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U opslane"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://opslane:opslane_dev@localhost:5432/opslane?sslmode=disable
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - name: Apply migrations
        run: MIGRATION_DIR=packages/ingestion/db/migrations ./scripts/run-migrations.sh
      - run: pnpm install --frozen-lockfile
      - name: Install Playwright chromium (SDK browser tests)
        run: pnpm --filter @opslane/sdk exec playwright install --with-deps chromium
      - run: pnpm -r build
      - run: pnpm test:unit
      - name: License-boundary check (MIT-published packages)
        run: node scripts/check-licenses.mjs

  sdk-python:
    name: Python SDK tests (${{ matrix.python-version }})
    needs: [changes]
    if: needs.changes.outputs.python == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12', '3.13', '3.14']
    defaults:
      run:
        working-directory: packages/sdk-python
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install -e '.[dev]'
      - run: python -m pytest -v
      - name: Build and validate artifacts
        if: matrix.python-version == '3.14'
        run: |
          python -m pip install build twine
          python -m build
          python -m twine check --strict dist/*
          python -m venv /tmp/wheelcheck
          /tmp/wheelcheck/bin/pip install dist/*.whl
          /tmp/wheelcheck/bin/python -c "import opslane, importlib.metadata as md; assert opslane.__version__ == md.version('opslane'); print('wheel ok', opslane.__version__)"
          python -m venv /tmp/sdistcheck
          /tmp/sdistcheck/bin/pip install dist/*.tar.gz
          /tmp/sdistcheck/bin/python -c "import opslane; print('sdist ok', opslane.__version__)"

  compose:
    name: Compose validation
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - run: docker compose config --quiet

  e2e-keyless:
    name: Keyless smoke E2E
    needs: [changes]
    if: needs.changes.outputs.e2e == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      # Deterministic canaries planted where real secrets would live; the leak
      # scan below fails the job if they surface in logs or HTTP responses.
      GITHUB_APP_CLIENT_SECRET: OPSLANE-E2E-CANARY-ingestion-2f9c41d7
      E2B_API_KEY: OPSLANE-E2E-CANARY-worker-8b1e63aa
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # The friction e2e gate runs the worker's session-analysis pipeline
      # in-process (issue #56), so the built worker package must exist. The
      # login browser smoke serves the dashboard's dist via vite preview, so
      # the dashboard build must exist too.
      - run: pnpm --filter @opslane/shared --filter @opslane/worker --filter @opslane/dashboard build
      - name: Install Playwright chromium (browser smoke)
        run: pnpm --filter @opslane/test-e2e exec playwright install --with-deps chromium
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.12'
      # The python smoke serves test-fixtures/flask-app with the real SDK.
      # Without flask its live leg skips, and the skip gate below fails the
      # job rather than letting Python coverage silently disappear. Flask is
      # pinned to the fixture's requirements.txt.
      - name: Install Flask for the python SDK smoke
        run: python -m pip install 'flask==3.0.3'
      - name: Assert the LLM key is absent
        run: |
          if [ -n "${ANTHROPIC_API_KEY:-}" ]; then
            echo "ANTHROPIC_API_KEY must not be set in the keyless lane."
            exit 1
          fi
      - name: Boot the stack without an LLM key
        env:
          # The notifications contract test runs a webhook sink on the runner;
          # the container reaches it via the extra_hosts host-gateway mapping.
          NOTIFY_UNSAFE_EXTRA_WEBHOOK_HOSTS: host.docker.internal:9999
        run: |
          docker compose up -d postgres minio minio-setup
          docker compose run --rm migrate
          docker compose up -d --build --wait ingestion worker
      - name: Assert the worker container is keyless
        run: docker compose exec -T worker sh -c '[ -z "$ANTHROPIC_API_KEY" ]'
      - name: Run E2E contracts with hard assertions
        env:
          DATABASE_URL: postgres://opslane:opslane_dev@localhost:5434/opslane
          INGESTION_URL: http://localhost:8082
          E2E_WORKER_NO_KEY: "1"
          # Friction gate (issue #56): host-reachable MinIO for the in-process
          # chunk read; the injected adjudicator keeps this lane keyless.
          MINIO_ENDPOINT: http://localhost:9012
          MINIO_ACCESS_KEY: minio
          MINIO_SECRET_KEY: minio12345
          MINIO_BUCKET: opslane-replays
          # Interpreter the python smoke serves the Flask fixture with; the
          # setup-python step above put flask in it.
          OPSLANE_PYTHON: python
        run: >
          pnpm --filter @opslane/test-e2e exec vitest run
          --reporter=default --reporter=json
          --outputFile=${{ runner.temp }}/e2e-results.json
      - name: Enforce zero unexpected skips
        env:
          # The with-secrets PR pipeline suite is the only allowed skip here.
          E2E_ALLOWED_SKIP_PATTERN: '^pr_created pipeline \(full flow\)'
          # The exact collected total, not a slack floor, so any silently
          # dropped test trips it. Re-derive from an actual run's
          # numTotalTests — NOT from `vitest list`, which does not expand
          # it.each and undercounts (60 vs 75, the 24 REASON_CODES cases):
          #   vitest run --reporter=json --outputFile=/tmp/e2e.json
          #   node -e 'console.log(require("/tmp/e2e.json").numTotalTests)'
          E2E_MIN_TESTS: "75"
          # The browser smoke suites must be collected AND pass by name, so a
          # future edit cannot drop them while keeping the total count intact.
          # The environments/projects suites below are pinned for the same
          # reason: they are the only end-to-end proof that events with
          # different keys and environments resolve correctly, that the
          # override fallbacks fire, and that the dashboard filter, project
          # switch, and SDK environment payload work in a real browser. Without
          # pinning, a skipIf regression (missing INGESTION_URL or Chromium)
          # would silently drop them while the total count still passed.
          # The python smoke's live leg is pinned for the same reason: it
          # self-skips without flask, and a skip here is a coverage hole.
          # The origin-allowlist cases are pinned individually rather than by
          # suite prefix: they carry the #104 security contract, and a suite
          # prefix would let the rejection cases be deleted while the accepted
          # case alone keeps the pattern matching.
          E2E_REQUIRED_PATTERNS: |
            ^browser smoke: Vue error to needs_human >
            ^browser smoke: React error to needs_human >
            ^browser smoke: rage click to friction signal >
            ^notifications contract
            ^python SDK live smoke \(Flask fixture → ingestion\) >
            ^python wire adversarial \(hostile non-SDK client\) >
            ^first-class environment ingestion > keeps one group across key environments
            ^first-class environment ingestion > resolves opted-in names and accepts disabled, unknown, and invalid
            ^first-class environment ingestion > supports out-of-order events, makes the existing same-project session
            ^dashboard environment filtering > gates readiness and filters incidents, detail chips, and sessions in real Chromium
            ^first-class projects dashboard > switches safely from a deep link and provisions a usable project key
            ^SDK environment browser contract > sends the configured name through real Chromium
            ^origin allowlist with a server-side SDK > accepts a backend event that carries no Origin or Referer$
            ^origin allowlist with a server-side SDK > accepts a browser event from an allowlisted origin$
            ^origin allowlist with a server-side SDK > rejects a browser event from an origin not on the list$
            ^origin allowlist with a server-side SDK > rejects a referer-only event from an origin not on the list$
            ^origin allowlist with a server-side SDK > keeps browser-only routes strict for header-less callers$
            ^real Chromium always sends Origin to /events > rejects a page whose origin is not on the allowlist$
            ^real Chromium always sends Origin to /events > accepts the same page once its origin is allowlisted$
        run: node scripts/check-e2e-results.mjs "${{ runner.temp }}/e2e-results.json"
      - name: Token-leak scan over logs and public HTTP surfaces
        run: |
          docker compose logs --no-color > "${{ runner.temp }}/stack-logs.txt"
          curl -fsS http://localhost:8082/health > "${{ runner.temp }}/responses.txt" || true
          curl -fsS http://localhost:8082/ >> "${{ runner.temp }}/responses.txt" || true
          leak=0
          for canary in "OPSLANE-E2E-CANARY-ingestion-2f9c41d7" "OPSLANE-E2E-CANARY-worker-8b1e63aa"; do
            if grep -qF "$canary" "${{ runner.temp }}/stack-logs.txt" "${{ runner.temp }}/responses.txt"; then
              echo "Token leak detected: $canary appeared in scanned surfaces."
              leak=1
            fi
          done
          [ "$leak" -eq 0 ] && echo "Leak scan clean."
          exit "$leak"
      - name: Dump stack logs on failure
        if: failure()
        run: docker compose logs --no-color | tail -300
      - name: Teardown
        if: always()
        run: docker compose down -v

  reliability-system:
    name: Deterministic event-to-PR reliability
    needs: [changes]
    if: needs.changes.outputs.reliability == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run deterministic success pipeline
        run: pnpm test:reliability:system
      - name: Dump harness logs on failure
        if: failure()
        run: docker compose logs --no-color | tail -300
      - name: Teardown
        if: always()
        run: docker compose down -v

  security:
    name: Secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Gitleaks secret scan
        run: >
          docker run --rm -v "$PWD:/repo:ro"
          ghcr.io/gitleaks/gitleaks@sha256:e1b35e12a8c6fa8901f060459cfb6b2fc4c484d3afbe3b029733a3bbfab07055
          dir /repo --config /repo/.gitleaks.toml --no-banner --redact
  ci-ok:
    name: ci-ok
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [changes, repo-checks, go, js, sdk-python, compose, e2e-keyless, reliability-system, security]
    if: always()
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Report job results
        env:
          RESULTS: ${{ toJSON(needs) }}
        run: echo "$RESULTS"
      - name: Verify every job ran or skipped exactly as classified
        env:
          NEEDS: ${{ toJSON(needs) }}
        run: node scripts/check-ci-ok.mjs

  # Candidate images: only on push to main, only after ci-ok. The unique tag
  # main-<sha>-<run-id>-<attempt> IS the candidate's identity (no stored
  # manifest); the release workflow resolves digests from it at promotion.
  candidate-images:
    name: Publish candidate images
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [ci-ok]
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        image: [ingestion, worker]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Log in to GHCR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: echo "$GH_TOKEN" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
      - name: Build and push candidate
        id: push
        env:
          IMAGE: ghcr.io/${{ github.repository_owner }}/opslane-${{ matrix.image }}
          TAG: main-${{ github.sha }}-${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          docker build -f "packages/${{ matrix.image }}/Dockerfile" -t "$IMAGE:$TAG" .
          docker push "$IMAGE:$TAG"
          digest=$(docker inspect --format '{{index .RepoDigests 0}}' "$IMAGE:$TAG")
          echo "Candidate pushed: $IMAGE:$TAG"
          echo "Digest: $digest"
          {
            echo "### Candidate: \`${{ matrix.image }}\`"
            echo '```'
            echo "tag:    $IMAGE:$TAG"
            echo "digest: $digest"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
